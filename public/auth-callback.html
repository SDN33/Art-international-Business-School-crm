<!doctype html>
<html lang="en" translate="no" class="notranslate">
    <head>
        <meta charset="utf-8" />
        <meta
            name="viewport"
            content="minimum-scale=1, initial-scale=1, width=device-width, shrink-to-fit=no"
        />
        <meta name="theme-color" content="#000000" />
        <meta name="google" content="notranslate" />
        <link rel="manifest" href="./manifest.json" />
        <link rel="shortcut icon" href="./favicon.ico" />
        <title>Atomic CRM</title>
        <style>
            body {
                margin: 0;
                padding: 0;
                font-family: sans-serif;
            }

            .loader-container {
                display: flex;
                align-items: center;
                justify-content: center;
                flex-direction: column;
                position: absolute;
                top: 0;
                bottom: 0;
                left: 0;
                right: 0;
                background-color: #fafafa;
            }

            /* CSS Spinner from https://projects.lukehaas.me/css-loaders/ */

            .loader,
            .loader:before,
            .loader:after {
                border-radius: 50%;
            }

            .loader {
                color: #283593;
                font-size: 11px;
                text-indent: -99999em;
                margin: 55px auto;
                position: relative;
                width: 10em;
                height: 10em;
                box-shadow: inset 0 0 0 1em;
                -webkit-transform: translateZ(0);
                -ms-transform: translateZ(0);
                transform: translateZ(0);
            }

            .loader:before,
            .loader:after {
                position: absolute;
                content: '';
            }

            .loader:before {
                width: 5.2em;
                height: 10.2em;
                background: #fafafa;
                border-radius: 10.2em 0 0 10.2em;
                top: -0.1em;
                left: -0.1em;
                -webkit-transform-origin: 5.2em 5.1em;
                transform-origin: 5.2em 5.1em;
                -webkit-animation: load2 2s infinite ease 1.5s;
                animation: load2 2s infinite ease 1.5s;
            }

            .loader:after {
                width: 5.2em;
                height: 10.2em;
                background: #fafafa;
                border-radius: 0 10.2em 10.2em 0;
                top: -0.1em;
                left: 5.1em;
                -webkit-transform-origin: 0px 5.1em;
                transform-origin: 0px 5.1em;
                -webkit-animation: load2 2s infinite ease;
                animation: load2 2s infinite ease;
            }

            @-webkit-keyframes load2 {
                0% {
                    -webkit-transform: rotate(0deg);
                    transform: rotate(0deg);
                }
                100% {
                    -webkit-transform: rotate(360deg);
                    transform: rotate(360deg);
                }
            }

            @keyframes load2 {
                0% {
                    -webkit-transform: rotate(0deg);
                    transform: rotate(0deg);
                }
                100% {
                    -webkit-transform: rotate(360deg);
                    transform: rotate(360deg);
                }
            }
        </style>
    </head>

    <body>
        <noscript> You need to enable JavaScript to run this app. </noscript>
        <div id="root">
            <div class="loader-container">
                <div class="loader">Loading...</div>
            </div>
        </div>
    </body>
    <script>
        function getUrlParams() {
            // Try hash fragment first (implicit flow)
            var source = window.location.hash.substring(1);
            // Fall back to query string (PKCE flow)
            if (!source || source === '') {
                source = window.location.search.substring(1);
            }
            var params = new URLSearchParams(source);
            return {
                access_token: params.get('access_token'),
                refresh_token: params.get('refresh_token'),
                type: params.get('type'),
                error: params.get('error'),
                error_description: params.get('error_description'),
                error_code: params.get('error_code'),
                code: params.get('code')
            };
        }

        function interceptAuthCallback() {
            var p = getUrlParams();

            // Handle errors from Supabase (e.g. expired token)
            if (p.error) {
                var msg = decodeURIComponent(p.error_description || p.error || 'Unknown error');
                document.getElementById('root').innerHTML =
                    '<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;flex-direction:column;padding:20px;text-align:center">' +
                    '<h2 style="color:#dc2626">Erreur d\'authentification</h2>' +
                    '<p>' + msg + '</p>' +
                    '<a href="./#/forgot-password" style="margin-top:16px;color:#2563eb;text-decoration:underline">Demander un nouveau lien</a>' +
                    '</div>';
                return;
            }

            // Handle PKCE flow (code in query string)
            if (p.code) {
                window.location.href = './#/auth-callback?code=' + encodeURIComponent(p.code);
                return;
            }

            // Handle implicit flow (tokens in hash)
            if (p.access_token && p.refresh_token && p.type) {
                window.location.href = './#/auth-callback?access_token=' + encodeURIComponent(p.access_token) +
                    '&refresh_token=' + encodeURIComponent(p.refresh_token) +
                    '&type=' + encodeURIComponent(p.type);
                return;
            }

            // No tokens and no error — redirect to login
            window.location.href = './#/login';
        }

        interceptAuthCallback();
    </script>
</html>
